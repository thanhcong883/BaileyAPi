<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Multi-Account Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; display: flex; height: 100vh; background: #f0f2f5; }
        #sidebar { width: 300px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        #sidebar-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        #account-list { flex: 1; overflow-y: auto; }
        .account-item { padding: 15px 20px; border-bottom: 1px solid #f9f9f9; cursor: pointer; display: flex; align-items: center; transition: background 0.2s; }
        .account-item:hover { background: #f5f5f5; }
        .account-item.active { background: #e7f3ff; border-left: 4px solid #0084ff; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 10px; }
        .status-connected { background: #4caf50; }
        .status-disconnected { background: #f44336; }

        #main { flex: 1; display: flex; flex-direction: column; background: #fff; position: relative; }
        #welcome-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #888; }
        #account-detail { display: none; padding: 30px; overflow-y: auto; }

        h2 { margin-top: 0; }
        .card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .qr-box { text-align: center; padding: 20px; }
        #qr-image { max-width: 256px; border: 1px solid #eee; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #0084ff; color: #fff; }
        .btn-danger { background: #f44336; color: #fff; }
        .btn-secondary { background: #eee; color: #333; }

        #messages { height: 300px; overflow-y: auto; border: 1px solid #eee; padding: 10px; background: #f9f9f9; border-radius: 4px; margin-bottom: 15px; display: flex; flex-direction: column-reverse; }
        .message-item { padding: 8px; border-bottom: 1px solid #eee; font-size: 14px; }
        .group-tag { font-size: 10px; background: #e0e0e0; padding: 2px 4px; border-radius: 3px; color: #666; }

        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .connected { background: #e8f5e9; color: #2e7d32; }
        .disconnected { background: #ffebee; color: #c62828; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div id="sidebar-header">
            <strong>Accounts</strong> <a href="/api-docs/" target="_blank" style="font-size: 12px; color: #0084ff; text-decoration: none; margin-left: 10px;">API Docs</a>
            <button class="btn-primary" onclick="addAccount()" style="padding: 5px 10px;">+</button>
        </div>
        <div id="account-list"></div>
    </div>

    <div id="main">
        <div id="welcome-screen">
            <h3>Select an account to manage</h3>
            <p>Or add a new one using the + button</p>
        </div>

        <div id="account-detail">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 id="active-account-id">Account</h2>
                <div>
                    <span id="status-text" class="status-badge">disconnected</span>
                    <button class="btn-secondary" onclick="reLogin()" style="margin-left: 10px;">Re-login</button>
                    <button class="btn-danger" onclick="deleteAccount()" style="margin-left: 10px;">Delete</button>
                </div>
            </div>

            <div id="qr-container" class="card" style="display: none;">
                <h3>Scan QR Code</h3>
                <p>Open WhatsApp on your phone and scan this code to login.</p>
                <div class="qr-box">
                    <img id="qr-image" src="" alt="QR Code">
                    <div style="margin-top: 10px;">
                        <button class="btn-secondary" onclick="refreshQR()">Refresh QR</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>Webhook Settings</h3>
                <div class="form-group">
                    <label>Webhook URL</label>
                    <input type="text" id="webhook-url" placeholder="https://your-api.com/webhook">
                </div>
                <button class="btn-primary" onclick="updateWebhook()">Save Settings</button>
            </div>

            <div class="card">
                <h3>Test Message</h3>
                <div id="messages"></div>
                <div class="form-group">
                    <label>Recipient ID (or select group)</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="to" placeholder="e.g. 849xxxxxxxx" style="flex: 2;">
                        <select id="group-select" onchange="document.getElementById('to').value = this.value" style="flex: 1;">
                            <option value="">-- Groups --</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea id="message" rows="3" placeholder="Type your message..."></textarea>
                </div>
                <button class="btn-primary" onclick="sendMessage()">Send Message</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let accounts = {};
        let selectedAccountId = null;

        async function fetchAccounts() {
            try {
                const response = await fetch('/api/accounts');
                const list = await response.json();
                accounts = {};
                list.forEach(acc => {
                    accounts[acc.accountId] = {
                        id: acc.accountId,
                        status: acc.isAuthenticated ? 'connected' : 'disconnected'
                    };
                });
                renderAccountList();
            } catch (err) {
                console.error('Failed to fetch accounts', err);
            }
        }

        function renderAccountList() {
            const list = document.getElementById('account-list');
            list.innerHTML = '';
            Object.values(accounts).forEach(acc => {
                const item = document.createElement('div');
                item.className = 'account-item' + (selectedAccountId === acc.id ? ' active' : '');
                item.onclick = () => selectAccount(acc.id);

                const statusDot = `<span class="status-dot ${acc.status === 'connected' ? 'status-connected' : 'status-disconnected'}"></span>`;
                item.innerHTML = `<div>${statusDot} ${acc.id}</div>`;
                list.appendChild(item);
            });
        }

        async function selectAccount(accountId) {
            selectedAccountId = accountId;
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('account-detail').style.display = 'block';
            document.getElementById('active-account-id').innerText = 'Account: ' + accountId;

            renderAccountList();
            updateUIForAccount();
            fetchWebhookSettings();
            refreshGroups();

            document.getElementById('messages').innerHTML = '';
        }

        function updateUIForAccount() {
            const acc = accounts[selectedAccountId];
            if (!acc) return;

            const statusEl = document.getElementById('status-text');
            statusEl.innerText = acc.status;
            statusEl.className = 'status-badge ' + acc.status;

            if (acc.status === 'connected') {
                document.getElementById('qr-container').style.display = 'none';
            } else {
                document.getElementById('qr-container').style.display = 'block';
                document.getElementById('qr-image').src = `/qr/${selectedAccountId}.png?t=${Date.now()}`;
            }
        }

        async function addAccount() {
            const accountId = prompt('Enter a unique Account ID:');
            if (accountId) {
                try {
                    const response = await fetch('/api/accounts', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ accountId })
                    });
                    const result = await response.json();
                    if (result.success) {
                        accounts[accountId] = { id: accountId, status: 'disconnected' };
                        selectAccount(accountId);
                    }
                } catch (err) {
                    alert('Failed to add account');
                }
            }
        }

        socket.on('status', (data) => {
            if (accounts[data.accountId]) {
                accounts[data.accountId].status = data.status;
                renderAccountList();
                if (selectedAccountId === data.accountId) {
                    updateUIForAccount();
                    if (data.status === 'connected') refreshGroups();
                }
            }
        });

        socket.on('qr', (data) => {
            if (selectedAccountId === data.accountId) {
                document.getElementById('qr-image').src = `/qr/${selectedAccountId}.png?t=${Date.now()}`;
            }
        });

        socket.on('message', (data) => {
            if (selectedAccountId === data.accountId) {
                const messagesEl = document.getElementById('messages');
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message-item';

                let label = `<b>${data.from}</b>`;
                if (data.isGroup) {
                    label += ` <span class="group-tag">Group</span>`;
                    if (data.participant) {
                        label += ` <br><small>By: ${data.participant}</small>`;
                    }
                }

                msgDiv.innerHTML = `${label}: ${data.text}`;
                messagesEl.prepend(msgDiv);
            }
        });

        async function fetchWebhookSettings() {
            if (!selectedAccountId) return;
            try {
                const response = await fetch(`/api/${selectedAccountId}/webhook-config`);
                const data = await response.json();
                document.getElementById('webhook-url').value = data.webhookUrl || '';
            } catch (err) {
                console.error('Failed to fetch webhook settings', err);
            }
        }

        async function updateWebhook() {
            const webhookUrl = document.getElementById('webhook-url').value;
            try {
                const response = await fetch(`/api/${selectedAccountId}/webhook-config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ webhookUrl })
                });
                const result = await response.json();
                if (result.success) {
                    alert('Webhook URL updated successfully!');
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (err) {
                alert('Failed to update webhook URL');
            }
        }

        async function reLogin() {
            if (confirm('Restart login process?')) {
                await fetch(`/api/${selectedAccountId}/re-login`, {
                    method: 'POST'
                });
                accounts[selectedAccountId].status = 'disconnected';
                updateUIForAccount();
            }
        }

        async function refreshQR() {
            try {
                await fetch(`/api/${selectedAccountId}/refresh-qr`, { method: 'POST' });
                updateUIForAccount();
            } catch (err) {
                console.error('Failed to refresh QR', err);
            }
        }

        async function deleteAccount() {
            if (confirm('Are you sure you want to delete this account? All session data will be removed.')) {
                try {
                    const response = await fetch(`/api/${selectedAccountId}`, {
                        method: 'DELETE'
                    });
                    const result = await response.json();
                    if (result.success) {
                        delete accounts[selectedAccountId];
                        selectedAccountId = null;
                        document.getElementById('account-detail').style.display = 'none';
                        document.getElementById('welcome-screen').style.display = 'flex';
                        renderAccountList();
                    } else {
                        alert('Error: ' + result.error);
                    }
                } catch (err) {
                    alert('Failed to delete account');
                }
            }
        }

        async function refreshGroups() {
            if (!selectedAccountId || accounts[selectedAccountId].status !== 'connected') return;
            try {
                const response = await fetch(`/api/${selectedAccountId}/groups`);
                const groups = await response.json();
                const select = document.getElementById('group-select');
                select.innerHTML = '<option value="">-- Select a group --</option>';

                if (groups) {
                    Object.values(groups).forEach(group => {
                        const opt = document.createElement('option');
                        opt.value = group.id;
                        opt.innerText = group.subject || group.id;
                        select.appendChild(opt);
                    });
                }
            } catch (err) {
                console.error('Failed to fetch groups', err);
            }
        }

        async function sendMessage() {
            const to = document.getElementById('to').value;
            const message = document.getElementById('message').value;

            if (!to || !message) return alert('Please fill in both fields');

            const isGroup = to.endsWith('@g.us');
            const type = isGroup ? 'group' : 'user';

            const response = await fetch(`/api/${selectedAccountId}/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ threadId: to, text: message, type })
            });

            const result = await response.json();
            if (result.success) {
                alert('Message sent!');
                document.getElementById('message').value = '';
            } else {
                alert('Error: ' + result.error);
            }
        }

        fetchAccounts();
    </script>
</body>
</html>
