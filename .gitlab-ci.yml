include:
  - project: 'devops/cicd'
    ref: 'master'
    file: 'base/remove-img-old.yml'

stages:
  - build
  - deploy
  - notify_success
  - notify_failure
  - remove_image_old
.build_template:
  before_script:
    - docker login $CI_REGISTRY -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD
  script:
    - docker pull $CI_REGISTRY_IMAGE:$CI_COMMIT_BRANCH.whatapp-api.latest || true
    - docker build --cache-from $CI_REGISTRY_IMAGE:$CI_COMMIT_BRANCH.whatapp-api.latest -t $CI_REGISTRY_IMAGE:$CI_COMMIT_BRANCH.$CI_COMMIT_SHORT_SHA.whatapp-api -t $CI_REGISTRY_IMAGE:$CI_COMMIT_BRANCH.whatapp-api.latest .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_BRANCH.whatapp-api.latest
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_BRANCH.$CI_COMMIT_SHORT_SHA.whatapp-api
  after_script:
    - docker rmi $CI_REGISTRY_IMAGE:$CI_COMMIT_BRANCH.whatapp-api.latest
    - docker rmi $CI_REGISTRY_IMAGE:$CI_COMMIT_BRANCH.$CI_COMMIT_SHORT_SHA.whatapp-api
    - docker rmi $(docker images -f "dangling=true" -q) || true

build_image_dev:
  stage: build
  extends: .build_template
  only:
    - main
  tags:
    - evg

replace-tag-image-dev:
  needs:
    - build_image_dev
  stage: build
  variables:
    VALUE_PATH: chart-support-ai-prod/chart-api/baileys2api/values.yaml
    TAG_PATH: .image.tag
  image: alpine:latest
  before_script:
    - apk update
    - apk add git yq
    - git clone https://$GIT_USER:$CI_PRIVATE_TOKEN@git@gitlab.evgcorp.net:devops/helm/chart-support-ai-prod.git
    - cd chart-support-ai-prod
    - git remote set-url origin "https://$GIT_USER:$CI_PRIVATE_TOKEN@git@gitlab.evgcorp.net:devops/helm/chart-support-ai-prod.git"
    # Configure git user
    - git config --global user.email "van.le@evgcorp.net"
    - git config --global user.name "GitLab CI by Van"
    # Reset to remote prod branch
    - git fetch
    - git checkout main
    - git reset --hard origin/main

  script:
    # Update YAML file
    - yq -i "$TAG_PATH = \"$CI_COMMIT_BRANCH.$CI_COMMIT_SHORT_SHA.whatapp-api\"" $VALUE_PATH
    - git add $VALUE_PATH
    - git commit -m "CI Deploy $TAG_PATH to $CI_COMMIT_BRANCH.$CI_COMMIT_SHORT_SHA.whatapp-api"
    - git push -o ci.skip origin HEAD:main

  only:
    - main
  tags:
    - evg

deploy_k8s:
  needs:
    - replace-tag-image-dev
  stage: deploy
  image: alpine:latest
  variables:
    PATH_DIR: '/root/chart-support-ai-prod/chart-api/baileys2api'
  before_script:
    - apk add --no-cache openssh-client
    - chmod 600 "$SSH_KEY_K8S" || true
  script:
    - ssh -i $SSH_KEY_K8S -o StrictHostKeyChecking=no $SSH_USER@$IP_VAN "cd $PATH_DIR && git pull origin main"
    - ssh -i $SSH_KEY_K8S -o StrictHostKeyChecking=no $SSH_USER@$IP_VAN "cd $PATH_DIR && helm --kubeconfig=/kube-config/dev/config upgrade --install whatapp-api . -n support-ai"
  when: manual
  only:
    - main
  tags:
    - evg


prune_img_old:
  stage: remove_image_old
  extends:
    - .remove-img
  environment:
    name: dev
  variables:
    GITOPS_SECRET: huyabc321
    GITOPS: http://img-old-delete-img-old.argocd/delete
  only:
    - main
  tags:
    - k8s-dev

notify_success:
  image: alpine
  needs:
    - deploy_k8s
  stage: notify_success
  before_script:
    - apk add --no-cache curl jq
  variables:
    CHAT_ID: "-4916051911"
    TOKEN_BOT: "8249105997:AAGkbkMTPZlGrMJ5Sukg1aPtDgZu7bSbIjU"
  script:
    - |
      curl -X POST -H "Content-Type: application/json" -d "{\"chat_id\": \"$CHAT_ID\", \"text\": \"✅ *${CI_PROJECT_NAME}* pipeline succeed on branch *${CI_COMMIT_REF_NAME}* of ${CI_COMMIT_MESSAGE}\"}" https://api.telegram.org/bot$TOKEN_BOT/sendMessage
  when: on_success
  only:
    - main
  tags:
    - evg


notify_failure:
  image: alpine
  needs:
    - deploy_k8s
  stage: notify_failure
  before_script:
    - apk add --no-cache curl jq
  variables:
    CHAT_ID: "-4916051911"
    TOKEN_BOT: "8249105997:AAGkbkMTPZlGrMJ5Sukg1aPtDgZu7bSbIjU"
  script:
    - |
      curl -X POST -H "Content-Type: application/json" -d "{\"chat_id\": \"$CHAT_ID\", \"text\": \" ❌ Project: *$CI_PROJECT_NAME* $JOB_NAME false on branch *${CI_COMMIT_REF_NAME}* of ${CI_COMMIT_MESSAGE} \"}" https://api.telegram.org/bot$TOKEN_BOT/sendMessage
  when: on_failure
  allow_failure: false
  only:
    - main
  tags:
    - evg
